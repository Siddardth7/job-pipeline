name: Daily Job Scrape

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

# ── All API keys injected as env vars so every script can read them ──────────
env:
  JSEARCH_API_KEYS:     ${{ secrets.JSEARCH_API_KEYS }}
  APIFY_TOKENS:         ${{ secrets.APIFY_TOKENS }}
  SERPAPI_KEY:          ${{ secrets.SERPAPI_KEY }}
  ADZUNA_APP_IDS:       ${{ secrets.ADZUNA_APP_IDS }}
  ADZUNA_APP_KEYS:      ${{ secrets.ADZUNA_APP_KEYS }}
  SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests apify-client python-dotenv supabase

      # ── STEP 1: Run all scrapers via orchestrator ─────────────────────────
      # Runs ATS → JSearch → Apify → SerpAPI → Adzuna in order.
      # Each scraper isolated in try/except — one failure never blocks others.
      # Outputs written to temp/jobs_*.json for the merge step.
      - name: Run scraper orchestrator
        continue-on-error: true
        run: python engine/scraper_orchestrator.py

      # ── STEP 2: Merge all sources + run hard filter stack (F1–F9) ─────────
      # Reads temp/jobs_*.json, deduplicates, filters, scores.
      # Output: temp/jobs_clean_intermediate.json
      - name: Merge and filter
        run: python pipeline/merge_pipeline.py

      # ── STEP 3: Company intelligence enrichment ───────────────────────────
      # Reads temp/jobs_clean_intermediate.json, adds tier/H1B/industry data.
      # Output: output/jobs_clean_latest.json
      - name: Run company intelligence
        continue-on-error: true
        run: python pipeline/company_intelligence.py

      # ── STEP 3b: Fallback — if company_intelligence failed, promote intermediate ─
      - name: Fallback output if company_intelligence failed
        if: always()
        run: |
          if [ ! -f output/jobs_clean_latest.json ] && [ -f temp/jobs_clean_intermediate.json ]; then
            mkdir -p output
            cp temp/jobs_clean_intermediate.json output/jobs_clean_latest.json
            echo "WARNING: Used intermediate file as fallback for output/jobs_clean_latest.json"
          fi

      # ── STEP 3c: Distribute jobs to per-user feeds ───────────────────────
      # Upserts all pipeline jobs into normalized_jobs, then scores and writes
      # user_job_feed rows for each registered user based on their role_targets.
      - name: Distribute feed to users
        continue-on-error: true
        run: python pipeline/distribute_feed.py

      # ── STEP 4: Commit results ────────────────────────────────────────────
      - name: Commit and push results
        run: |
          git config user.name  "Job Scraper Bot"
          git config user.email "bot@noreply.github.com"
          git add -f output/ temp/ data/
          git diff --staged --quiet || git commit -m "Daily scrape $(date +%Y-%m-%d)"
          git push

      # ── STEP 5: Summary (always runs, even if earlier steps failed) ───────
      - name: Show clean feed summary
        if: always()
        run: |
          if [ -f output/jobs_clean_latest.json ]; then
            python3 -c "
          import json
          d = json.load(open('output/jobs_clean_latest.json'))
          green  = d.get('green_jobs',  [])
          yellow = d.get('yellow_jobs', [])
          jobs   = green + yellow
          summary = d.get('summary', {})
          print('=== CLEAN FEED READY ===')
          print(f'GREEN:  {len(green)}')
          print(f'YELLOW: {len(yellow)}')
          print(f'TOTAL:  {len(jobs)}')
          print(f'History dupes removed: {summary.get(\"duplicates_removed\", \"?\")}')
          sources = {}
          for j in jobs:
              s = j.get('source', '?')
              sources[s] = sources.get(s, 0) + 1
          if sources:
              print('Sources:')
              for s, n in sorted(sources.items()):
                  print(f'  {s}: {n}')
          "
          elif [ -f temp/jobs_clean_intermediate.json ]; then
            python3 -c "
          import json
          d = json.load(open('temp/jobs_clean_intermediate.json'))
          jobs = d.get('jobs', [])
          print(f'Intermediate: {len(jobs)} jobs (company_intelligence may have failed)')
          "
          else
            echo "WARNING: No output files found — check logs above"
          fi
