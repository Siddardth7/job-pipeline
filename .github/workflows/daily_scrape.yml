name: Daily Job Scrape — JobAgent v4.1

on:
  schedule:
    - cron: '0 13 * * *'   # 13:00 UTC daily
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

env:
  JSEARCH_API_KEY:     ${{ secrets.JSEARCH_API_KEY }}
  SERPAPI_KEY:         ${{ secrets.SERPAPI_KEY }}
  APIFY_TOKEN:         ${{ secrets.APIFY_TOKEN }}
  APIFY_ACTOR_ID:      ${{ secrets.APIFY_ACTOR_ID }}      # optional: override actor slug
  THEIRSTACK_API_KEY:  ${{ secrets.THEIRSTACK_API_KEY }}  # backup scraper (free tier)

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests apify-client python-dotenv

      # ── 4. Ensure directories and seed files exist ─────────────────────────
      - name: Ensure output directories
        run: |
          mkdir -p temp output data
          [ -f data/job_history.json ]   || echo '[]' > data/job_history.json
          [ -f data/run_log.json ]       || echo '[]' > data/run_log.json
          [ -f data/scraper_state.json ] || echo '{
            "jsearch":    {"queries_today": 0},
            "serpapi":    {"queries_today": 0},
            "apify":      {"runs_today": 0},
            "theirstack": {"activations_today": 0},
            "last_reset": ""
          }' > data/scraper_state.json

      # ── 5. Run all scrapers via Orchestrator ───────────────────────────────
      # Runs: ATS (always) → JSearch → Apify → SerpAPI (alt. days) → TheirStack (if needed)
      - name: Run Scraper Orchestrator
        continue-on-error: true
        run: python -m engine.scraper_orchestrator

      # ── 6. Merge & Filter Pipeline ─────────────────────────────────────────
      - name: Run Merge Pipeline
        run: python -m pipeline.merge_pipeline

      # ── 7. Company Intelligence & Final Output ─────────────────────────────
      - name: Run Company Intelligence
        run: python -m pipeline.company_intelligence

      # ── 8. Print Summary ───────────────────────────────────────────────────
      - name: Print run summary
        if: always()
        run: |
          if [ -f output/jobs_clean_latest.json ]; then
            python3 - <<'EOF'
          import json
          jobs = json.load(open("output/jobs_clean_latest.json"))
          green  = [j for j in jobs if j.get("classification") == "GREEN"]
          yellow = [j for j in jobs if j.get("classification") == "YELLOW"]
          # Source breakdown
          from collections import Counter
          sources = Counter(j.get("source","?") for j in jobs)
          print("=" * 55)
          print("JobAgent v4.1 — Daily Run Summary")
          print("=" * 55)
          print(f"GREEN  jobs : {len(green)}")
          print(f"YELLOW jobs : {len(yellow)}")
          print(f"TOTAL  jobs : {len(jobs)}")
          print(f"\nBy source:  {dict(sources)}")
          if green:
              print("\nGREEN companies:")
              for j in green:
                  print(f"  • {j.get('company_name','?')} — {j.get('job_title','?')}")
          print("=" * 55)
          EOF
          else
            echo "WARNING: output/jobs_clean_latest.json not found"
          fi

      # ── 9. Commit results ──────────────────────────────────────────────────
      - name: Commit and push results
        run: |
          git config user.name  "JobAgent Bot"
          git config user.email "jobagent@noreply.github.com"
          git add -f output/ data/job_history.json data/run_log.json data/scraper_state.json
          git diff --staged --quiet \
            || git commit -m "chore: daily scrape $(date +%Y-%m-%d) [skip ci]"
          git push
