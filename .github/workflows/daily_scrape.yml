name: Daily Job Scrape

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
  SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
  APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
  THEIRSTACK_API_KEY: ${{ secrets.THEIRSTACK_API_KEY }}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests apify-client python-dotenv

      - name: Ensure output directories exist
        run: mkdir -p output temp data

      # STEP 1 - JSearch scraper
      # Hard cap: 10 minutes. If JSearch times out (exit 2) or errors,
      # the fallback TheirStack scraper runs automatically in STEP 1b.
      - name: Run JSearch scraper
        id: jsearch
        continue-on-error: true
        timeout-minutes: 10
        run: |
          python scrapers/jsearch_scraper.py
          echo "jsearch_exit=$?" >> $GITHUB_OUTPUT

      # STEP 1b - Fallback scraper (only runs if JSearch failed or timed out)
      - name: Run fallback scraper (JSearch timed out)
        if: steps.jsearch.outcome == 'failure' || steps.jsearch.outputs.jsearch_exit == '2'
        continue-on-error: true
        run: |
          echo "[fallback] JSearch did not complete — running TheirStack backup scraper..."
          python scrapers/theirstack_scraper.py

      # STEP 2 - SerpAPI (Google Jobs)
      - name: Run SerpAPI scraper
        continue-on-error: true
        run: python scrapers/serpapi_scraper.py

      # STEP 3 - Apify (LinkedIn)
      - name: Run Apify scraper
        continue-on-error: true
        run: python scrapers/apify_scraper.py --run

      # STEP 4 - ATS direct scraper (Greenhouse + Lever)
      - name: Run ATS scraper
        continue-on-error: true
        run: python scrapers/ats_scraper.py

      # STEP 5 - Scraper Orchestrator (coordinates + deduplicates all scraper output)
      - name: Run Scraper Orchestrator
        continue-on-error: true
        run: python -m engine.scraper_orchestrator

      # STEP 6 - Merge all sources into jobs_latest.json
      - name: Merge all sources
        run: python pipeline/merge_pipeline.py

      # STEP 7 - Company intelligence (GREEN/YELLOW/RED classification)
      - name: Run Company Intelligence
        run: python pipeline/company_intelligence.py

      # STEP 8 - Commit everything
      - name: Commit and push results
        run: |
          git config user.name "Job Scraper Bot"
          git config user.email "bot@noreply.github.com"
          git add -f output/
          git diff --staged --quiet || git commit -m "Daily scrape $(date +%Y-%m-%d)"
          git push

      # STEP 9 - Print final summary
      - name: Show clean feed summary
        if: always()
        run: |
          if [ -f output/jobs_clean_latest.json ]; then
            python3 - <<'EOF'
          import json
          from collections import Counter
          raw = json.load(open("output/jobs_clean_latest.json"))
          if isinstance(raw, dict):
              green  = raw.get("green_jobs",  [])
              yellow = raw.get("yellow_jobs", [])
              jobs   = green + yellow
          else:
              jobs   = raw
              green  = [j for j in jobs if j.get("verdict") == "GREEN"]
              yellow = [j for j in jobs if j.get("verdict") == "YELLOW"]
          sources = Counter(j.get("source","?") for j in jobs)
          print("=" * 55)
          print("JobAgent — Daily Run Summary")
          print("=" * 55)
          print(f"GREEN  jobs : {len(green)}")
          print(f"YELLOW jobs : {len(yellow)}")
          print(f"TOTAL  jobs : {len(jobs)}")
          print(f"\nBy source:  {dict(sources)}")
          if green:
              print("\nGREEN companies:")
              for j in green:
                  print(f"  • {j.get('company_name','?')} — {j.get('job_title','?')}")
          print("=" * 55)
          EOF
          else
            echo "WARNING: output/jobs_clean_latest.json not found"
          fi
