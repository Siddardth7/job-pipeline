name: Daily Job Scrape

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
  SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
  APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
  THEIRSTACK_API_KEY: ${{ secrets.THEIRSTACK_API_KEY }}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests apify-client python-dotenv

      # Ensure temp/ and output/ directories exist before any scraper runs
      # Also create __init__.py files for Python package imports
      - name: Create working directories
        run: |
          mkdir -p temp
          mkdir -p output
          mkdir -p data
          touch engine/__init__.py
          touch scrapers/__init__.py
          touch pipeline/__init__.py

      # STEP 1 — Run the scraper orchestrator
      # The orchestrator coordinates all 5 scrapers in sequence:
      #   1. ATS (Greenhouse + Lever — free, no quota)
      #   2. JSearch (RapidAPI — 200 req/month)
      #   3. Apify (LinkedIn — pay-per-compute)
      #   4. SerpApi (Google Jobs — 100 req/month)
      #   5. TheirStack (conditional fallback — 200 credits/month)
      # It handles quota management, fallback logic, and writes all outputs
      # to temp/jobs_*.json for the merge pipeline.
      - name: Run scraper orchestrator
        timeout-minutes: 20
        run: python -m engine.scraper_orchestrator

      # STEP 2 — Merge all sources + apply hard filter stack (F1–F9)
      # Reads temp/jobs_*.json, normalises, deduplicates, and filters.
      # Outputs temp/jobs_clean_intermediate.json
      - name: Merge and filter all sources
        run: python -m pipeline.merge_pipeline

      # STEP 3 — Company intelligence classification (GREEN / YELLOW / RED)
      # Promotes YELLOW → GREEN after ≥3 sightings in 30 days.
      # Outputs output/jobs_clean_latest.json (final feed for JobAgent UI)
      - name: Run company intelligence
        run: python -m pipeline.company_intelligence

      # STEP 4 — Commit everything
      - name: Commit and push results
        run: |
          git config user.name "Job Scraper Bot"
          git config user.email "bot@noreply.github.com"
          git add -f output/ data/
          git diff --staged --quiet || git commit -m "Daily scrape $(date +%Y-%m-%d)"
          git push

      # STEP 5 — Print final clean feed summary
      - name: Show clean feed summary
        if: always()
        run: |
          if [ -f output/jobs_clean_latest.json ]; then
            python3 -c "
          import json
          d = json.load(open('output/jobs_clean_latest.json'))
          s = d.get('summary', {})
          r = d.get('filter_report', {})
          print('=== CLEAN FEED READY ===')
          print(f'Input: {r.get(chr(34)+\"total_in\"+chr(34),0)} | Passed: {r.get(chr(34)+\"passed\"+chr(34),0)} ({r.get(chr(34)+\"pass_rate\"+chr(34),\"?\")}) | Rejected: {r.get(chr(34)+\"rejected\"+chr(34),0)}')
          print(f'GREEN:{s.get(chr(34)+\"green\"+chr(34),0)} YELLOW:{s.get(chr(34)+\"yellow\"+chr(34),0)} Tier1:{s.get(chr(34)+\"tier1\"+chr(34),0)} H1B-YES:{s.get(chr(34)+\"h1b_yes\"+chr(34),0)} Open-finds:{s.get(chr(34)+\"open_search\"+chr(34),0)}')
          "
          else
            echo "WARNING: jobs_clean_latest.json not found"
          fi
