name: Daily Job Scrape

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
  APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests apify-client python-dotenv

      - name: Run JSearch scraper
        continue-on-error: true
        run: python jsearch_scraper.py

      - name: Run Apify scraper
        continue-on-error: true
        run: python apify_scraper.py --run

      - name: Merge results
        run: python merge_pipeline.py

      - name: Commit and push results
        run: |
          git config user.name "Job Scraper Bot"
          git config user.email "bot@noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "Daily scrape $(date +%Y-%m-%d)"
          git push

      - name: Check feed output
        if: always()
        run: |
          if [ -f output/jobs_latest.json ]; then
            echo "Feed generated successfully"
            wc -c output/jobs_latest.json
          else
            echo "WARNING: jobs_latest.json not found"
          fi
