github/workflows/daily_scrape.yml
# Runs JSearch + Apify scrapers daily at 8 AM EST, merges results.
# Free tier: 2,000 minutes/month GitHub Actions (~5 min/day = ~150/month)
#
# QUOTA MATH (safe defaults in scripts):
#   JSearch: 3 companies × 2 keywords = 6 calls/day = ~180/month (free tier: 200/month)
#   Apify:   15 companies/day (Google Jobs fallback, uses Apify credits ~$0.01/run)
#
# REQUIRED SECRETS (Settings > Secrets and variables > Actions):
#   JSEARCH_API_KEY  — from https://rapidapi.com/letscrape-6bRBa3QguO5/api/jsearch
#   APIFY_TOKEN      — from https://console.apify.com/account/integrations

name: Daily Job Scrape

on:
  schedule:
    - cron: '0 13 * * *'  # 8 AM EST = 1 PM UTC
  workflow_dispatch:        # Manual trigger from Actions tab

env:
  JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
  APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests apify-client python-dotenv

      - name: Run JSearch scraper
        # Scripts now exit 0 on quota/missing key and write empty output files
        # continue-on-error here catches any unexpected crashes
        continue-on-error: true
        run: python jsearch_scraper.py

      - name: Run Apify scraper
        continue-on-error: true
        run: python apify_scraper.py --run

      - name: Merge results
        run: python merge_pipeline.py

      - name: Commit and push results
        run: |
          git config user.name "Job Scraper Bot"
          git config user.email "bot@noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "Daily scrape $(date +%Y-%m-%d)"
          git push

      - name: Print feed summary
        if: always()
        run: |
          if [ -f output/jobs_latest.json ]; then
            echo "=== Feed Summary ==="
            python3 -c "
import json
with open('output/jobs_latest.json') as f:
    d = json.load(f)
s = d.get('summary', {})
src = d.get('sources', {})
print(f'Total jobs: {s.get(\"total\", 0)}')
print(f'  GREEN:  {s.get(\"green\", 0)}')
print(f'  YELLOW: {s.get(\"yellow\", 0)}')
print(f'  RED:    {s.get(\"red_itar\", 0)}')
print(f'Sources: jsearch={src.get(\"jsearch\", 0)}, apify={src.get(\"apify\", 0)}')
"
          else
            echo "WARNING: jobs_latest.json not found"
          fi
