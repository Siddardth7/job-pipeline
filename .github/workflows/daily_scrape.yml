name: Daily Job Scrape

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
  APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests apify-client python-dotenv

      # STEP 1 - JSearch targeted + open search
      # Hard cap: 10 minutes. If JSearch times out (exit 2), the fallback
      # scraper runs automatically in STEP 1b below.
      - name: Run JSearch scraper
        id: jsearch
        continue-on-error: true
        timeout-minutes: 10
        run: |
          python jsearch_scraper.py
          echo "jsearch_exit=$?" >> $GITHUB_OUTPUT

      # STEP 1b - Fallback scraper: runs ONLY if JSearch timed out (exit code 2)
      # or if the JSearch step itself was cancelled/errored.
      - name: Run fallback scraper (JSearch timed out)
        if: steps.jsearch.outcome == 'failure' || steps.jsearch.outputs.jsearch_exit == '2'
        continue-on-error: true
        run: |
          echo "[fallback] JSearch did not complete in time — running backup scraper..."
          python theirstack_scraper.py

      # STEP 2 - Apify targeted + open search
      - name: Run Apify scraper
        continue-on-error: true
        run: python apify_scraper.py --run

      # STEP 3 - Merge all 4 sources into jobs_latest.json
      - name: Merge all sources
        run: python merge_pipeline.py

      # STEP 4 - Apply all Instruction Sheet hard filters
      - name: Apply hard filters (post-merge gate)
        run: python post_merge_filter.py

      # STEP 5 - Commit everything
      - name: Commit and push results
        run: |
          git config user.name "Job Scraper Bot"
          git config user.email "bot@noreply.github.com"
          git add -f output/
          git diff --staged --quiet || git commit -m "Daily scrape + filter $(date +%Y-%m-%d)"
          git push

      # STEP 6 - Print final clean feed summary
      - name: Show clean feed summary
        if: always()
        run: |
          if [ -f output/jobs_clean_latest.json ]; then
            python3 -c "
          import json
          d = json.load(open('output/jobs_clean_latest.json'))
          s = d.get('summary', {})
          r = d.get('filter_report', {})
          print('=== CLEAN FEED READY ===')
          print(f'Input: {r.get(chr(34)+\"total_in\"+chr(34),0)} | Passed: {r.get(chr(34)+\"passed\"+chr(34),0)} ({r.get(chr(34)+\"pass_rate\"+chr(34),\"?\")}) | Rejected: {r.get(chr(34)+\"rejected\"+chr(34),0)}')
          print(f'GREEN:{s.get(chr(34)+\"green\"+chr(34),0)} YELLOW:{s.get(chr(34)+\"yellow\"+chr(34),0)} Tier1:{s.get(chr(34)+\"tier1\"+chr(34),0)} H1B-YES:{s.get(chr(34)+\"h1b_yes\"+chr(34),0)} Open-finds:{s.get(chr(34)+\"open_search\"+chr(34),0)}')
          "
          else
            echo "WARNING: jobs_clean_latest.json not found"
          fi
