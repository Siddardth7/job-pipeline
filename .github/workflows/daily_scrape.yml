name: Daily Job Scrape

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

# ── All API keys injected as env vars so every script can read them ──────────
env:
  JSEARCH_API_KEY:    ${{ secrets.JSEARCH_API_KEY }}
  APIFY_TOKEN:        ${{ secrets.APIFY_TOKEN }}
  SERPAPI_KEY:        ${{ secrets.SERPAPI_KEY }}
  THEIRSTACK_API_KEY: ${{ secrets.THEIRSTACK_API_KEY }}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests apify-client python-dotenv

      # ── STEP 1: Run all scrapers via orchestrator ─────────────────────────
      # Runs ATS → JSearch → Apify → SerpAPI → TheirStack in order.
      # Each scraper is isolated in a try/except — one failure never blocks others.
      # Outputs written to temp/jobs_*.json for the merge step.
      - name: Run scraper orchestrator
        continue-on-error: true
        run: python scraper_orchestrator.py

      # ── STEP 2: Merge all sources + run hard filter stack (F1–F9) ─────────
      # Reads temp/jobs_*.json, deduplicates, filters, scores.
      # Output: temp/jobs_clean_intermediate.json
      - name: Merge and filter
        run: python merge_pipeline.py

      # ── STEP 3: Company intelligence enrichment ───────────────────────────
      # Reads temp/jobs_clean_intermediate.json, adds tier/H1B/industry data.
      # Output: output/jobs_clean_latest.json
      - name: Run company intelligence
        continue-on-error: true
        run: python company_intelligence.py

      # ── STEP 4: Commit results ────────────────────────────────────────────
      - name: Commit and push results
        run: |
          git config user.name  "Job Scraper Bot"
          git config user.email "bot@noreply.github.com"
          git add -f output/ temp/ data/
          git diff --staged --quiet || git commit -m "Daily scrape $(date +%Y-%m-%d)"
          git push

      # ── STEP 5: Summary (always runs, even if earlier steps failed) ───────
      - name: Show clean feed summary
        if: always()
        run: |
          if [ -f output/jobs_clean_latest.json ]; then
            python3 -c "
          import json
          d = json.load(open('output/jobs_clean_latest.json'))
          jobs = d.get('jobs', [])
          print('=== CLEAN FEED READY ===')
          print(f'Total jobs: {len(jobs)}')
          sources = {}
          for j in jobs:
              s = j.get('source','?')
              sources[s] = sources.get(s, 0) + 1
          for s, n in sorted(sources.items()):
              print(f'  {s}: {n}')
          "
          elif [ -f temp/jobs_clean_intermediate.json ]; then
            python3 -c "
          import json
          d = json.load(open('temp/jobs_clean_intermediate.json'))
          jobs = d.get('jobs', [])
          print(f'Intermediate output: {len(jobs)} jobs (company_intelligence may have failed)')
          "
          else
            echo "WARNING: No output files found — check orchestrator and merge logs above"
          fi
